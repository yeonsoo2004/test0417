<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .main {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 1440px;
            margin: auto;
        }

        .box {
            background-color: lightgray;
            width: 50%;
            height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .top-box {
            height: 50%;
        }

        .bottom-box {
            height: 50%;
            margin: auto;
            text-align: center;
        }

        h4 {
            font-size: 16px;
            color: gray;
        }

        p {
            font-size: 20px;
            color: #000;
            font-weight: bold;
        }

        @media(max-width:768px) {
            .main {
                flex-direction: column;
            }
            .box {
                width: 100%;
            }
        }
        
    </style>
</head>

<body>
    <section>
        <div class="main">
            <div class="box">
                <div class="top-box"></div>
                <div class="bottom-box">
                    <h4>adsfsdf</h4>
                    <p>Lorem ipsum dolor sit, </p>
                </div>
            </div>
            <div class="box">
                <div class="top-box"></div>
                <div class="bottom-box">
                    <h4>adsfsdf</h4>
                    <p>Lorem ipsum dolor sit, </p>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
